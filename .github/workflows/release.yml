name: Release

on:
  push:
    tags:
      - "v*"          # e.g. v1.0.0

permissions:
  contents: write     # required to create/update the GitHub Release

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: Windows
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Package (CPack)
        run: cpack --config build/CPackConfig.cmake -B dist

      - name: List artifacts
        shell: bash
        run: ls -la dist/*.zip dist/*.tar.gz 2>/dev/null || ls -la dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lumina-${{ matrix.name }}
          path: |
            dist/*.zip
            dist/*.tar.gz

  release:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release with binaries
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
